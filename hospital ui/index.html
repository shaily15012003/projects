<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital Appointment UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <h1>MediBook</h1>
    <ul>
      <li><a href="#" onclick="showPage('login')">Login</a></li>
      <li><a href="#" onclick="showPage('doctors list')">Find Doctors</a></li>
      <li><a href="#" onclick="showPage('dashboard')">My Appointments</a></li>
    </ul>
  </nav>

  <!-- Pages -->
  <div id="pages">
    <!-- Login -->
    <section id="login" class="page">
      <h2>Login</h2>
      <select id="role">
        <option value="patient">Patient</option>
        <option value="doctor">Doctor</option>
      </select>
      <button onclick="login()">Continue</button>
    </section>

    <!-- Doctor List -->
    <section id="doctors" class="page hidden">
      <h2>Find Doctors</h2>
      <div id="doctorList"></div>
    </section>

    <!-- Booking -->
    <section id="booking" class="page hidden">
      <h2>Book Appointment</h2>
      <p id="selectedDoctor"></p>
      <label>Date:</label>
      <input type="date" id="dateInput"><br>
      <label>Time:</label>
      <input type="time" id="timeInput"><br>
      <button onclick="confirmBooking()">Confirm</button>
    </section>

    <!-- Dashboard -->
    <section id="dashboard" class="page hidden">
      <h2>My Appointments</h2>
      <div id="appointments"></div>
    </section>

    <!-- Queue -->
    <section id="queue" class="page hidden">
      <h2>Live Queue</h2>
      <div id="queueList"></div>
    </section>
  </div>

<script src="script.js"></script>
</body>
</html>
